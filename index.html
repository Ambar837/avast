<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="img/icontab.png">
    <title>Verificador de Seguridad - Avast</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }
        .quiz-container {
            max-width: 680px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }
        .avast-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 32px;
        }
        .avast-logo img {
            width: 40px;
            height: 40px;
        }
        .avast-logo span {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .progress {
            height: 6px;
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            margin-bottom: 32px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff7e5f, #feb47b);
            border-radius: 10px;
            transition: width 0.4s ease;
        }
        .step-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 28px;
            text-align: center;
            line-height: 1.3;
            color: #f0f0f0;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 20px;
        }
        .option-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 16px 24px;
            font-size: 1rem;
            font-weight: 500;
            color: #ddd;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 14px;
            backdrop-filter: blur(8px);
        }
        .option-btn:hover {
            background: rgba(255, 126, 95, 0.15);
            border-color: #ff7e5f;
            color: #fff;
            transform: translateY(-1px);
        }
        .option-btn.selected {
            background: rgba(255, 126, 95, 0.25);
            border-color: #ff7e5f;
            color: white;
            box-shadow: 0 4px 15px rgba(255,126,95,0.3);
        }
        .btn-disabled {
            pointer-events: none;
            opacity: 0.5;
        }
        .result-box {
            background: rgba(220, 20, 60, 0.15);
            border: 1px solid rgba(220, 20, 60, 0.4);
            border-radius: 20px;
            padding: 28px 24px;
            text-align: center;
            margin: 24px 0;
        }
        .risk-level {
            font-size: 2.4rem;
            font-weight: 800;
            color: #ff4d6a;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }
        .threat-list {
            list-style: none;
            text-align: left;
            margin: 24px 0;
        }
        .threat-list li {
            padding: 12px 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            color: #ccc;
        }
        .cta-button {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            color: #1a1a2e;
            font-weight: 700;
            font-size: 1.2rem;
            padding: 18px 24px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: all 0.2s;
            letter-spacing: 0.3px;
            box-shadow: 0 10px 25px -8px rgba(255,126,95,0.4);
            margin-top: 16px;
        }
        .cta-button:hover {
            transform: scale(1.02);
            box-shadow: 0 14px 30px -6px rgba(255,126,95,0.6);
            filter: brightness(1.05);
        }
        .discount-badge {
            background: #ff4d6a;
            color: white;
            font-weight: 700;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            display: inline-block;
            margin-left: 8px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        .timer {
            font-weight: 600;
            color: #feb47b;
            margin: 12px 0 0;
        }
        .hidden {
            display: none;
        }
        .footer-note {
            text-align: center;
            margin-top: 24px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
        }
        .loader {
            text-align: center;
            padding: 30px;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #ff7e5f;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .geo-display {
            text-align: center;
            margin-top: 12px;
            font-size: 0.85rem;
            background: rgba(255,255,255,0.08);
            display: inline-block;
            width: auto;
            padding: 5px 12px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }
        .geo-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }
        @media (max-width: 500px) {
            .quiz-container {
                padding: 28px 20px;
            }
            .step-title {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <!-- Пиксель трекинга (загрузка страницы) -->
    <img src="https://mqglly.abadit5rckb.com/trackpixel/track?tid=:cid&amt=:payout" width="1" height="1" style="display:none;" />

    <!-- iFrame пиксель -->
    <iframe width="1" height="1" border="0" style="display: none;" src="http://abpostback.com/pixel/script?tid=YOUR_NETWORK_TOKEN&amt=REPLACE&txid=REPLACE&status=REPLACE"></iframe>

    <div class="quiz-container" id="quizContainer">
        <div class="avast-logo">
            <img src="img/logo1200.png" alt="Avast Logo">
            <span>Avast</span>
        </div>

        <div class="progress">
            <div class="progress-bar" id="progressBar" style="width: 0%;"></div>
        </div>

        <div id="dynamicContent"></div>
    </div>

    <script>
        // ========== НАСТРОЙКИ (не меняем) ==========
        const OFFER_URL = 'https://ahyiu.com/af?o=3d75bdd2185e766f096a8a2ca6b5af18:8199ee3f3e8cb18083e4093a748b0510&cid=&subid=';
        const POSTBACK_URL = 'https://mqglly.abadit5rckb.com/trackpixel/track?tid=:cid&amt=:payout';

        // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
        let currentLanguage = 'es';     // 'es' o 'pt'
        let userGeoCode = 'UNKNOWN';
        let userGeoName = 'Internacional';
        let currentStep = 0;
        let totalWeight = 0;
        let answers = [];

        // ========== МУЛЬТИЯЗЫЧНЫЕ СТРОКИ ==========
        const translations = {
            es: {
                loadingGeo: "Detectando tu región...",
                questions: [
                    "¿Con qué frecuencia realizas compras en línea o accedes a tu banca digital?",
                    "¿Has notado que tu PC está más lenta o se calienta sin motivo aparente?",
                    "¿Utilizas la misma contraseña para varias cuentas o servicios?"
                ],
                options: [
                    ["Todos los días", "Varias veces por semana", "Casi nunca"],
                    ["Sí, mucho últimamente", "Un poco, a veces", "No, todo normal"],
                    ["Sí, para casi todas", "Algunas se repiten", "No, cada una es única"]
                ],
                optionIcons: [["🛒", "💳", "🏦"], ["🐌", "⏳", "✅"], ["🔑", "🔐", "🛡️"]],
                optionWeights: [[3,2,1], [3,2,0], [3,2,0]],
                loader: {
                    analyzing: "Analizando tus respuestas...",
                    verifying: "Verificando riesgos de seguridad"
                },
                riskPrefix: "RIESGO",
                riskLevels: { high: "ALTO", medium: "MEDIO", low: "BAJO" },
                threatLists: {
                    high: [
                        "🔴 Posible robo de datos bancarios y contraseñas.",
                        "🔴 Programas no deseados que rastrean tu actividad.",
                        "🔴 Riesgo de suplantación de identidad (phishing)."
                    ],
                    medium: [
                        "🟠 Tu información personal podría estar expuesta en redes públicas.",
                        "🟠 Se detectaron comportamientos inusuales en segundo plano.",
                        "🟠 Vulnerabilidades en contraseñas repetidas."
                    ],
                    low: [
                        "🟢 No se detectaron amenazas graves, pero tu equipo podría estar desprotegido ante ataques futuros.",
                        "🟢 La ausencia de síntomas no garantiza seguridad total."
                    ]
                },
                trustText: "🧑‍💻 <strong>435 millones de usuarios</strong> confían en Avast",
                awardText: "Premio a la mejor protección 2025 según AV-Comparatives",
                buttonText: "Activar Avast Premium",
                discountBadge: "-60% HOY",
                timerPrefix: "⏳ Oferta válida por tiempo limitado: ",
                exclusivePrefix: "🌎 Oferta exclusiva para residentes de ",
                geoLabel: "📍 Tu ubicación:"
            },
            pt: {
                loadingGeo: "Detectando sua região...",
                questions: [
                    "Com que frequência você faz compras online ou acessa seu banco digital?",
                    "Você notou que seu PC está mais lento ou superaquece sem motivo aparente?",
                    "Você usa a mesma senha para várias contas ou serviços?"
                ],
                options: [
                    ["Todos os dias", "Várias vezes por semana", "Quase nunca"],
                    ["Sim, muito ultimamente", "Um pouco, às vezes", "Não, tudo normal"],
                    ["Sim, para quase todas", "Algumas se repetem", "Não, cada uma é única"]
                ],
                optionIcons: [["🛒", "💳", "🏦"], ["🐌", "⏳", "✅"], ["🔑", "🔐", "🛡️"]],
                optionWeights: [[3,2,1], [3,2,0], [3,2,0]],
                loader: {
                    analyzing: "Analisando suas respostas...",
                    verifying: "Verificando riscos de segurança"
                },
                riskPrefix: "RISCO",
                riskLevels: { high: "ALTO", medium: "MÉDIO", low: "BAIXO" },
                threatLists: {
                    high: [
                        "🔴 Possível roubo de dados bancários e senhas.",
                        "🔴 Programas indesejados que rastreiam sua atividade.",
                        "🔴 Risco de roubo de identidade (phishing)."
                    ],
                    medium: [
                        "🟠 Suas informações pessoais podem estar expostas em redes públicas.",
                        "🟠 Comportamentos incomuns detectados em segundo plano.",
                        "🟠 Vulnerabilidades em senhas repetidas."
                    ],
                    low: [
                        "🟢 Nenhuma ameaça grave detectada, mas seu computador pode estar desprotegido contra ataques futuros.",
                        "🟢 A ausência de sintomas não garante segurança total."
                    ]
                },
                trustText: "🧑‍💻 <strong>435 milhões de usuários</strong> confiam na Avast",
                awardText: "Prêmio de melhor proteção 2025 pela AV-Comparatives",
                buttonText: "Ativar Avast Premium",
                discountBadge: "-60% HOJE",
                timerPrefix: "⏳ Oferta válida por tempo limitado: ",
                exclusivePrefix: "🌎 Oferta exclusiva para residentes do ",
                geoLabel: "📍 Sua localização:"
            }
        };

        // ========== GEO DETECCIÓN (IP + FALLBACK) sin animación ==========
        async function detectUserGeo() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                if (!response.ok) throw new Error('GeoAPI error');
                const data = await response.json();
                const countryCode = data.country_code;
                const countryName = data.country_name;
                return { code: countryCode, name: countryName };
            } catch (error) {
                console.warn("Fallo geolocalización por IP, usando fallback por idioma");
                const lang = navigator.language || navigator.userLanguage || '';
                if (lang.toLowerCase().startsWith('pt')) {
                    return { code: 'BR', name: 'Brasil' };
                }
                let fallbackName = "Latinoamérica";
                let fallbackCode = "LATAM";
                if (lang.includes('es-MX')) { fallbackName = "México"; fallbackCode = "MX"; }
                else if (lang.includes('es-AR')) { fallbackName = "Argentina"; fallbackCode = "AR"; }
                else if (lang.includes('es-CO')) { fallbackName = "Colombia"; fallbackCode = "CO"; }
                else if (lang.includes('es-CL')) { fallbackName = "Chile"; fallbackCode = "CL"; }
                else if (lang.includes('es-ES')) { fallbackName = "España"; fallbackCode = "ES"; }
                return { code: fallbackCode, name: fallbackName };
            }
        }

        // ========== ИНИЦИАЛИЗАЦИЯ БЕЗ АНИМАЦИИ ==========
        async function initQuiz() {
            // 1. Определяем гео (фоном, без спиннера и сообщений)
            const geoData = await detectUserGeo();
            userGeoCode = geoData.code;
            userGeoName = geoData.name;
            
            // 2. Выбираем язык: португальский только для Бразилии
            if (userGeoCode === 'BR') {
                currentLanguage = 'pt';
            } else {
                currentLanguage = 'es';
            }
            
            // 3. Сразу запускаем викторину (первый вопрос) — без анимаций загрузки региона
            startQuiz();
        }
        
        function startQuiz() {
            // Сброс состояния викторины
            currentStep = 0;
            totalWeight = 0;
            answers = [];
            const progressBar = document.getElementById('progressBar');
            if (progressBar) progressBar.style.width = '0%';
            renderQuestion(0);
        }
        
        // ========== ОТРИСОВКА ВОПРОСА (мультиязык) ==========
        function renderQuestion(index) {
            const t = translations[currentLanguage];
            if (index >= t.questions.length) {
                showAnalysis();
                return;
            }
            
            const progressBar = document.getElementById('progressBar');
            progressBar.style.width = ((index / t.questions.length) * 100) + '%';
            
            const questionText = t.questions[index];
            const opts = t.options[index];
            const icons = t.optionIcons[index];
            const weights = t.optionWeights[index];
            
            let html = `<div class="step-title">${questionText}</div><div class="options">`;
            for (let i = 0; i < opts.length; i++) {
                html += `
                    <div class="option-btn" data-weight="${weights[i]}" data-answer="${opts[i]}">
                        <span class="icon">${icons[i]}</span>
                        <span>${opts[i]}</span>
                    </div>
                `;
            }
            html += `</div>`;
            document.getElementById('dynamicContent').innerHTML = html;
            
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    if (this.classList.contains('btn-disabled')) return;
                    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                    this.classList.add('selected');
                    const weight = parseInt(this.dataset.weight);
                    totalWeight += weight;
                    answers.push({
                        question: t.questions[currentStep],
                        answer: this.dataset.answer,
                        weight: weight
                    });
                    document.querySelectorAll('.option-btn').forEach(b => b.classList.add('btn-disabled'));
                    setTimeout(() => {
                        currentStep++;
                        renderQuestion(currentStep);
                    }, 300);
                });
            });
        }
        
        // ========== ФИНАЛЬНЫЙ АНАЛИЗ + ВЫВОД ГЕО ПОД КНОПКОЙ ==========
        function showAnalysis() {
            const dynamicDiv = document.getElementById('dynamicContent');
            const t = translations[currentLanguage];
            const progressBar = document.getElementById('progressBar');
            progressBar.style.width = '100%';
            
            // Показываем кратковременный лоадер для анализа ответов (это не анимация региона, а обработка ответов)
            dynamicDiv.innerHTML = `
                <div class="loader">
                    <div class="spinner"></div>
                    <p style="color:#ccc;">${t.loader.analyzing}</p>
                    <p style="font-size:0.8rem; color:#888;">${t.loader.verifying}</p>
                </div>
            `;
            
            setTimeout(() => {
                let riskKey = 'low';
                if (totalWeight >= 8) riskKey = 'high';
                else if (totalWeight >= 5) riskKey = 'medium';
                else riskKey = 'low';
                
                const riskLevelText = t.riskLevels[riskKey];
                let threats = [];
                if (riskKey === 'high') threats = t.threatLists.high;
                else if (riskKey === 'medium') threats = t.threatLists.medium;
                else threats = t.threatLists.low;
                
                // Формируем текст эксклюзивного предложения с учётом гео
                let exclusiveRegionText = `${t.exclusivePrefix}${userGeoName}`;
                if (currentLanguage === 'pt' && userGeoCode === 'BR') {
                    exclusiveRegionText = `${t.exclusivePrefix}Brasil`;
                }
                
                // Отображение гео под кнопкой (как и требовалось)
                const geoDisplayHtml = `
                    <div class="geo-wrapper">
                        <div class="geo-display">
                            ${t.geoLabel} ${userGeoName} ${(userGeoCode === 'BR' ? '🇧🇷' : (userGeoCode === 'MX' ? '🇲🇽' : (userGeoCode === 'CO' ? '🇨🇴' : '🌍')))}
                        </div>
                    </div>
                `;
                
                const html = `
                    <div class="result-box">
                        <div class="risk-level">${t.riskPrefix} ${riskLevelText}</div>
                        <p style="font-size:1rem; margin-bottom:8px;">${currentLanguage === 'es' ? 'Según tus respuestas, tu PC presenta:' : 'De acordo com suas respostas, seu PC apresenta:'}</p>
                        <ul class="threat-list">
                            ${threats.map(threat => `<li>${threat}</li>`).join('')}
                        </ul>
                    </div>
                    <div style="text-align:center; margin-top:12px;">
                        <p style="font-weight:500; margin-bottom:4px;">${t.trustText}</p>
                        <p style="font-size:0.9rem; color:#ccc;">${t.awardText}</p>
                    </div>
                    <a href="${OFFER_URL}" class="cta-button" id="ctaButton" target="_blank">
                        ${t.buttonText} <span class="discount-badge">${t.discountBadge}</span>
                    </a>
                    ${geoDisplayHtml}
                    <p class="timer" id="timerText">${t.timerPrefix}<span id="countdown">05:00</span></p>
                    <p style="font-size:0.9rem; text-align:center; margin-top:16px; color:#ddd;">
                        ${exclusiveRegionText}
                    </p>
                `;
                dynamicDiv.innerHTML = html;
                startCountdown();
            }, 2500);
        }
        
        function startCountdown() {
            let time = 300;
            const countdownEl = document.getElementById('countdown');
            if (!countdownEl) return;
            const interval = setInterval(() => {
                if (time <= 0) {
                    clearInterval(interval);
                    if (countdownEl) countdownEl.textContent = "00:00";
                    const timerTextSpan = document.getElementById('timerText');
                    if (timerTextSpan) {
                        timerTextSpan.innerHTML = currentLanguage === 'es' ? "⚠️ La oferta ha expirado. Actualiza la página para verificar disponibilidad." : "⚠️ A oferta expirou. Atualize a página para verificar disponibilidade.";
                    }
                    return;
                }
                time--;
                const minutes = Math.floor(time / 60);
                const seconds = time % 60;
                if (countdownEl) countdownEl.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }
        
        // ========== ЗАПУСК (без анимации региона) ==========
        initQuiz();
    </script>
</body>
</html>
