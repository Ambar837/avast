<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Renew subscription</title>
    <link rel="icon" type="image/png" sizes="32x32" href="img/icontab.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            /* Темно-серый фон, но не черный */
            background: #2d313a;
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            transition: background-color 0.3s ease;
        }
        /* При наведении на кнопку фон становится светлым */
        body:has(.renew-btn:hover) {
            background: #e2e6ec;
        }
        /* Кнопка увеличенная, яркая */
        .renew-btn {
            background: #ff6d2c;
            border: none;
            color: white;
            font-weight: 800;
            letter-spacing: 0.5px;
            cursor: pointer;
            font-family: inherit;
            display: inline-block;
            width: 380px;
            max-width: 100%;
            padding: 1.4rem 2rem;
            font-size: 1.6rem;
            border-radius: 80px;
            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.25);
            text-align: center;
            transition: 0.25s ease;
        }
        .renew-btn:hover {
            background: #e55a1e;
            transform: translateY(-2px);
            box-shadow: 0 14px 22px rgba(0, 0, 0, 0.3);
        }
        .renew-btn:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <button class="renew-btn js-renew-btn">Renew subscription</button>

    <script>
        (function() {
            "use strict";

            // Макрос: предупреждение при закрытии/обновлении страницы
            let userHasInteracted = false;
            function enableBeforeUnload() {
                userHasInteracted = true;
            }

            ['click', 'scroll', 'keydown', 'touchstart'].forEach(eventType => {
                document.addEventListener(eventType, enableBeforeUnload, { once: true, passive: true });
            });

            function beforeUnloadHandler(e) {
                const message = '⚠️ Ваша подписка не продлена! ПК остаётся незащищённым. Вы действительно хотите покинуть страницу?';
                e.preventDefault();
                e.returnValue = message;
                return message;
            }

            window.addEventListener('beforeunload', beforeUnloadHandler);

            function disableBeforeUnloadTemporarily() {
                window.removeEventListener('beforeunload', beforeUnloadHandler);
                setTimeout(() => {
                    window.addEventListener('beforeunload', beforeUnloadHandler);
                }, 800);
            }

            const renewBtn = document.querySelector('.js-renew-btn');
            if (renewBtn) {
                renewBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    disableBeforeUnloadTemporarily();
                    window.open('https://uwahh.com/af?o=578247e31f36be2ec628b6630a593238:9c641662078345bcdc1cf2bf8f24576f&cid=&subid=', '_blank', 'noopener,noreferrer');
                });
            }
        })();
    </script>
</body>
</html>
